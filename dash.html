<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DDC Library Management System</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; }
        
        /* Main App Layout */
        .app-wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid #ecf0f1;
            text-align: center;
            background: linear-gradient(135deg, #2c5f8a 0%, #1e4464 100%);
            color: white;
        }
        
        .sidebar-header h2 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        
        .sidebar-header h2 i { margin-right: 8px; }
        
        .sidebar-header p { font-size: 0.75rem; opacity: 0.8; }
        
        .sidebar-nav { padding: 20px 0; }
        
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #5a6e7c;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover {
            background: #f8f9fa;
            color: #2c5f8a;
        }
        
        .nav-item.active {
            background: #e8f0f7;
            color: #2c5f8a;
            border-left-color: #2c5f8a;
        }
        
        .nav-item i { width: 24px; font-size: 1.1rem; }
        .nav-item span { flex: 1; font-weight: 500; }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            background: #f0f2f5;
            min-height: 100vh;
        }
        
        .top-bar {
            background: white;
            padding: 15px 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #2c5f8a;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-name {
            font-weight: 500;
            color: #2c3e50;
        }
        
        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        
        .logout-btn:hover { background: #c0392b; transform: translateY(-2px); }
        
        .content-area { padding: 25px; }
        
        /* Stats Cards */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card i { font-size: 2rem; color: #2c5f8a; margin-bottom: 10px; }
        .stat-card h3 { color: #7f8c8d; font-size: 0.85rem; margin-bottom: 8px; }
        .stat-card .stat-number { font-size: 2rem; font-weight: bold; color: #2c3e50; }
        
        /* Tables */
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; color: #2c3e50; border-bottom: 2px solid #ecf0f1; }
        td { padding: 12px; border-bottom: 1px solid #ecf0f1; }
        tr:hover { background: #f8f9fa; }
        
        /* Badges */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge-available { background: #d4edda; color: #155724; }
        .badge-borrowed { background: #f8d7da; color: #721c24; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-info { background: #d1ecf1; color: #0c5460; }
        
        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; margin: 0 5px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #2c5f8a; color: white; }
        .btn-primary:hover { background: #1e4464; transform: translateY(-2px); }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #229954; transform: translateY(-2px); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .action-btn { padding: 5px 12px; margin: 0 3px; font-size: 0.8rem; }
        
        /* Forms */
        .form-container { background: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .section-header h2 { font-size: 1.3rem; color: #2c3e50; }
        .section-header h2 i { color: #2c5f8a; margin-right: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 600; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 10px; font-size: 14px; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: #2c5f8a; outline: none; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 550px; margin: 50px auto; padding: 30px; border-radius: 20px; max-height: 85vh; overflow-y: auto; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #ecf0f1; }
        .modal-header h3 { color: #2c3e50; font-size: 1.3rem; }
        .modal-header h3 i { color: #2c5f8a; margin-right: 10px; }
        .close { font-size: 1.8rem; cursor: pointer; color: #7f8c8d; transition: color 0.3s; }
        .close:hover { color: #e74c3c; }
        
        /* Search */
        .search-box { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .search-box input { flex: 1; padding: 12px 20px; border: 2px solid #ecf0f1; border-radius: 10px; font-size: 14px; min-width: 200px; }
        .ddc-nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .ddc-class { background: white; padding: 12px 5px; border-radius: 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: all 0.3s; border: 2px solid transparent; }
        .ddc-class:hover { border-color: #2c5f8a; transform: translateY(-2px); }
        
        .quick-actions { display: flex; gap: 15px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .spinner { width: 40px; height: 40px; border: 3px solid #ecf0f1; border-top-color: #2c5f8a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
            .stats-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-book"></i> DDC Library</h2>
                <p>Integrated Management System</p>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-view="catalog">
                    <i class="fas fa-books"></i>
                    <span>DDC Catalog</span>
                </div>
                <div class="nav-item" data-view="members">
                    <i class="fas fa-users"></i>
                    <span>Members</span>
                </div>
                <div class="nav-item" data-view="circulation">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Circulation</span>
                </div>
                <div class="nav-item" data-view="fines">
                    <i class="fas fa-money-bill"></i>
                    <span>Fines</span>
                </div>
                <div class="nav-item" data-view="ddcClasses">
                    <i class="fas fa-sitemap"></i>
                    <span>DDC Classes</span>
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="user-info">
                    <i class="fas fa-user-circle" style="font-size: 1.5rem; color: #2c5f8a;"></i>
                    <span class="user-name" id="userName">Librarian</span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
            
            <div class="content-area" id="contentArea">
                <div style="text-align: center; padding: 50px;">
                    <div class="spinner"></div>
                    <p>Loading library system...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAv3HaMVSZOWO1-R1kq0hBIyzaMe6qJz08",
            authDomain: "library-web-app-bf033.firebaseapp.com",
            projectId: "library-web-app-bf033",
            storageBucket: "library-web-app-bf033.firebasestorage.app",
            messagingSenderId: "767632185573",
            appId: "1:767632185573:web:4e5ff30593d436cba7dc0c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        // DDC Main Classes
        const ddcMainClasses = [
            { number: '000', name: 'General Works' },
            { number: '100', name: 'Philosophy & Psychology' },
            { number: '200', name: 'Religion' },
            { number: '300', name: 'Social Sciences' },
            { number: '400', name: 'Language' },
            { number: '500', name: 'Natural Sciences & Mathematics' },
            { number: '600', name: 'Technology' },
            { number: '700', name: 'Arts & Recreation' },
            { number: '800', name: 'Literature' },
            { number: '900', name: 'History & Geography' }
        ];

        // ========== AUTHENTICATION ==========
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                currentUser = user;
                document.getElementById('userName').textContent = user.email.split('@')[0];
            }
        });

        // ========== NAVIGATION ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                const view = item.dataset.view;
                switch(view) {
                    case 'dashboard': loadDashboard(); break;
                    case 'catalog': loadCatalog(); break;
                    case 'members': loadMembers(); break;
                    case 'circulation': loadCirculation(); break;
                    case 'fines': loadFines(); break;
                    case 'ddcClasses': loadDDCClasses(); break;
                }
            });
        });

        // Mobile menu toggle
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // ========== DASHBOARD ==========
        async function loadDashboard() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div> Loading...</div>';
            
            try {
                const booksSnapshot = await db.collection('books').get();
                const membersSnapshot = await db.collection('members').get();
                const borrowedSnapshot = await db.collection('transactions').where('status', '==', 'Borrowed').get();

                const totalBooks = booksSnapshot.size;
                const availableBooks = booksSnapshot.docs.filter(d => d.data().status === 'Available').length;
                const borrowedBooks = booksSnapshot.docs.filter(d => d.data().status === 'Borrowed').length;
                const totalMembers = membersSnapshot.size;
                const activeBorrowings = borrowedSnapshot.size;

                let transactionsHtml = '';
                try {
                    const recent = await db.collection('transactions').orderBy('issueDate', 'desc').limit(5).get();
                    recent.forEach(doc => {
                        const t = doc.data();
                        const issueDate = t.issueDate ? new Date(t.issueDate.toDate()).toLocaleDateString() : 'N/A';
                        transactionsHtml += `<tr><td>${t.transactionId || 'N/A'}</td><td>${t.accessionNo || 'N/A'}</td><td>${t.memberId || 'N/A'}</td><td>${issueDate}</td><td><span class="badge badge-${t.status === 'Borrowed' ? 'borrowed' : 'available'}">${t.status || 'N/A'}</span></td></tr>`;
                    });
                } catch(e) { console.log('No transactions'); }

                const html = `
                    <div class="stats-container">
                        <div class="stat-card"><i class="fas fa-book"></i><h3>Total Books</h3><div class="stat-number">${totalBooks}</div></div>
                        <div class="stat-card"><i class="fas fa-check-circle"></i><h3>Available Books</h3><div class="stat-number">${availableBooks}</div></div>
                        <div class="stat-card"><i class="fas fa-exchange-alt"></i><h3>Borrowed Books</h3><div class="stat-number">${borrowedBooks}</div></div>
                        <div class="stat-card"><i class="fas fa-users"></i><h3>Total Members</h3><div class="stat-number">${totalMembers}</div></div>
                        <div class="stat-card"><i class="fas fa-clock"></i><h3>Active Borrowings</h3><div class="stat-number">${activeBorrowings}</div></div>
                    </div>
                    <div class="form-container">
                        <div class="section-header"><h2><i class="fas fa-history"></i> Recent Transactions</h2></div>
                        <div class="table-container">
                            <table><thead><tr><th>Transaction ID</th><th>Accession No</th><th>Member ID</th><th>Issue Date</th><th>Status</th></tr></thead><tbody>${transactionsHtml || '<tr><td colspan="5" style="text-align:center">No transactions</td></tr>'}</tbody></table>
                        </div>
                    </div>
                    <div class="quick-actions">
                        <button class="btn btn-primary" onclick="showAddBookForm()"><i class="fas fa-plus"></i> Add Book</button>
                        <button class="btn btn-success" onclick="showAddMemberForm()"><i class="fas fa-user-plus"></i> Add Member</button>
                        <button class="btn btn-warning" onclick="showCheckoutForm()"><i class="fas fa-hand-holding"></i> New Checkout</button>
                    </div>
                `;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading dashboard</div>';
            }
        }

        // ========== CATALOG ==========
        async function loadCatalog() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div> Loading catalog...</div>';
            
            try {
                const booksSnapshot = await db.collection('books').orderBy('accessionNo').get();
                let booksHtml = '';
                booksSnapshot.forEach(doc => {
                    const b = doc.data();
                    booksHtml += `<tr><td>${b.accessionNo || 'N/A'}</td><td><strong>${b.title || 'N/A'}</strong></td><td>${b.author || 'N/A'}</td><td>${b.isbn || '-'}</td> <td>${b.subject || '-'}</td> <td><span class="badge badge-info">${b.ddcNumber || '-'}</span></td> <td>${b.year || '-'}</td> <td>${b.totalCopies || 0}</td> <td>${b.availableCopies || 0}</td> <td><span class="badge badge-${b.status === 'Available' ? 'available' : 'borrowed'}">${b.status || 'Available'}</span></td> <td><button class="btn btn-danger action-btn" onclick="deleteBook('${doc.id}')"><i class="fas fa-trash"></i></button></td> </tr>`;
                });

                const html = `
                    <div class="form-container">
                        <div class="section-header"><h2><i class="fas fa-books"></i> DDC Catalog</h2><button class="btn btn-success" onclick="showAddBookForm()"><i class="fas fa-plus"></i> Add New Book</button></div>
                        <div class="search-box"><input type="text" id="catalogSearch" placeholder="Search by title, author, ISBN..."><button class="btn btn-primary" onclick="searchCatalog()"><i class="fas fa-search"></i> Search</button></div>
                        <div class="ddc-nav">${ddcMainClasses.map(ddc => `<div class="ddc-class" onclick="filterByDDC('${ddc.number}')"><strong>${ddc.number}</strong><br><small>${ddc.name}</small></div>`).join('')}</div>
                        <div class="table-container"> <table> <thead> <tr><th>Accession</th><th>Title</th><th>Author</th><th>ISBN</th><th>Subject</th><th>DDC</th><th>Year</th><th>Total</th><th>Available</th><th>Status</th><th>Actions</th></tr> </thead> <tbody id="catalogTableBody">${booksHtml || '<tr><td colspan="11" style="text-align:center">No books</td></tr>'}</tbody> </table> </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading catalog</div>';
            }
        }

        // ========== MEMBERS ==========
        async function loadMembers() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div> Loading members...</div>';
            
            try {
                const membersSnapshot = await db.collection('members').orderBy('memberId').get();
                let membersHtml = '';
                membersSnapshot.forEach(doc => {
                    const m = doc.data();
                    membersHtml += `<tr><td><strong>${m.memberId || 'N/A'}</strong></td> <td>${m.name || 'N/A'}</td> <td><span class="badge badge-info">${m.category || 'N/A'}</span></td> <td>${m.phone || 'N/A'}</td> <td><span class="badge badge-${m.status === 'Active' ? 'available' : 'borrowed'}">${m.status || 'Active'}</span></td> <td><button class="btn btn-danger action-btn" onclick="deleteMember('${doc.id}')"><i class="fas fa-trash"></i></button></td> </tr>`;
                });

                const html = `
                    <div class="form-container">
                        <div class="section-header"><h2><i class="fas fa-users"></i> Library Members</h2><button class="btn btn-success" onclick="showAddMemberForm()"><i class="fas fa-user-plus"></i> Add Member</button></div>
                        <div class="search-box"><input type="text" id="memberSearch" placeholder="Search by name or ID..."><button class="btn btn-primary" onclick="searchMembers()"><i class="fas fa-search"></i> Search</button></div>
                        <div class="table-container"> <table> <thead> <tr><th>Member ID</th><th>Name</th><th>Category</th><th>Phone</th><th>Status</th><th>Actions</th></tr> </thead> <tbody id="membersTableBody">${membersHtml || '<tr><td colspan="6" style="text-align:center">No members</td></tr>'}</tbody> </table> </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading members</div>';
            }
        }

        // ========== CIRCULATION ==========
        async function loadCirculation() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div> Loading circulation...</div>';
            
            try {
                const transactionsSnapshot = await db.collection('transactions').orderBy('issueDate', 'desc').get();
                let transactionsHtml = '';
                transactionsSnapshot.forEach(doc => {
                    const t = doc.data();
                    const issueDate = t.issueDate ? new Date(t.issueDate.toDate()).toLocaleDateString() : '-';
                    const dueDate = t.dueDate ? new Date(t.dueDate.toDate()).toLocaleDateString() : '-';
                    const returnDate = t.returnDate ? new Date(t.returnDate.toDate()).toLocaleDateString() : '-';
                    transactionsHtml += `<tr><td>${t.transactionId || 'N/A'}</td><td><strong>${t.accessionNo || 'N/A'}</strong></td><td>${t.memberId || 'N/A'}</td><td>${issueDate}</td><td>${dueDate}</td><td>${returnDate}</td><td><span class="badge badge-${t.status === 'Borrowed' ? 'borrowed' : 'available'}">${t.status || 'N/A'}</span></td><td>${t.status === 'Borrowed' ? `<button class="btn btn-success action-btn" onclick="returnBook('${doc.id}', '${t.accessionNo}')"><i class="fas fa-undo"></i> Return</button>` : '-'}</td></tr>`;
                });

                const html = `
                    <div class="form-container">
                        <div class="section-header"><h2><i class="fas fa-exchange-alt"></i> Circulation</h2><button class="btn btn-success" onclick="showCheckoutForm()"><i class="fas fa-hand-holding"></i> New Checkout</button></div>
                        <div class="table-container"> <table> <thead> <tr><th>Transaction ID</th><th>Accession No</th><th>Member ID</th><th>Issue Date</th><th>Due Date</th><th>Return Date</th><th>Status</th><th>Actions</th></tr> </thead> <tbody>${transactionsHtml || '<tr><td colspan="8" style="text-align:center">No transactions</td></tr>'}</tbody> </table> </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading circulation</div>';
            }
        }

        // ========== FINES ==========
        async function loadFines() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div> Loading fines...</div>';
            
            try {
                const finesSnapshot = await db.collection('fines').get();
                let finesHtml = '';
                let totalFines = 0;
                finesSnapshot.forEach(doc => {
                    const f = doc.data();
                    totalFines += f.totalFine || 0;
                    finesHtml += `<tr><td>${f.transactionId || 'N/A'}</td><td>${f.dueDate ? new Date(f.dueDate.toDate()).toLocaleDateString() : '-'}</td><td>${f.returnDate ? new Date(f.returnDate.toDate()).toLocaleDateString() : '-'}</td><td>${f.daysLate || 0}</td><td>K${f.finePerDay || 500}</td><td><strong style="color:#e74c3c">K${f.totalFine || 0}</strong></td><td>${f.status !== 'Paid' ? `<button class="btn btn-success action-btn" onclick="payFine('${doc.id}')">Pay</button>` : '<span class="badge badge-available">Paid</span>'}</td></tr>`;
                });

                const html = `
                    <div class="stats-container"><div class="stat-card"><i class="fas fa-money-bill-wave"></i><h3>Total Outstanding Fines</h3><div class="stat-number" style="color:#e74c3c">K${totalFines}</div></div></div>
                    <div class="form-container"><div class="section-header"><h2><i class="fas fa-exclamation-triangle"></i> Fines Management</h2></div>
                    <div class="table-container"> <table> <thead> <tr><th>Transaction ID</th><th>Due Date</th><th>Return Date</th><th>Days Late</th><th>Fine per Day</th><th>Total Fine</th><th>Action</th></tr> </thead> <tbody>${finesHtml || '<tr><td colspan="7" style="text-align:center">No fines</td></tr>'}</tbody> </table> </div></div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading fines</div>';
            }
        }

        // ========== DDC CLASSES ==========
        function loadDDCClasses() {
            const html = `<div class="form-container"><div class="section-header"><h2><i class="fas fa-sitemap"></i> DDC Main Classes</h2></div><div class="table-container"><table><thead><tr><th>Class Number</th><th>Class Name</th><th>Description</th></tr></thead><tbody>${ddcMainClasses.map(ddc => `<tr><td><strong>${ddc.number}</strong></td><td>${ddc.name}</td><td>Books in ${ddc.name.toLowerCase()}</td></tr>`).join('')}</tbody></table></div><div style="margin-top:20px;padding:15px;background:#f8f9fa;border-radius:10px;"><h4>📖 About DDC</h4><p>The Dewey Decimal Classification organizes library materials by discipline. The ten main classes (000-900) cover all major branches of knowledge.</p></div></div>`;
            document.getElementById('contentArea').innerHTML = html;
        }

        // ========== FORM FUNCTIONS ==========
        function showAddBookForm() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-plus-circle"></i> Add New Book</h3><span class="close" onclick="closeModal()">&times;</span></div>
                <form onsubmit="saveBook(event)"><div class="form-group"><label>Accession Number *</label><input type="text" id="accessionNo" required placeholder="e.g., A001"></div>
                <div class="form-group"><label>Title *</label><input type="text" id="title" required></div>
                <div class="form-row"><div class="form-group"><label>Author *</label><input type="text" id="author" required></div><div class="form-group"><label>ISBN</label><input type="text" id="isbn"></div></div>
                <div class="form-row"><div class="form-group"><label>Subject</label><input type="text" id="subject"></div><div class="form-group"><label>DDC Number *</label><select id="ddcNumber" required><option value="">Select</option>${ddcMainClasses.map(d => `<option value="${d.number}">${d.number} - ${d.name}</option>`).join('')}</select></div></div>
                <div class="form-row"><div class="form-group"><label>Year</label><input type="number" id="year" min="1900" max="2026"></div><div class="form-group"><label>Total Copies *</label><input type="number" id="totalCopies" value="1" min="1" required></div></div>

        }

        function showAddMemberForm() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-user-plus"></i> Add New Member</h3><span class="close" onclick="closeModal()">&times;</span></div>
                <form onsubmit="saveMember(event)"><div class="form-group"><label>Member ID *</label><input type="text" id="memberId" required placeholder="e.g., M001"></div>
                <div class="form-group"><label>Full Name *</label><input type="text" id="memberName" required></div>
                <div class="form-row"><div class="form-group"><label>Category *</label><select id="memberCategory" required><option value="">Select</option><option value="Student">Student</option><option value="Teaching Staff">Teaching Staff</option><option value="Non-Teaching Staff">Non-Teaching Staff</option><option value="External Member">External Member</option></select></div>
                <div class="form-group"><label>Phone *</label><input type="tel" id="memberPhone" required></div></div>
                <div class="form-group"><label>Status *</label><select id="memberStatus" required><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>

            modal.style.display = 'block';

        function showCheckoutForm() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header"><h3><i class="fas fa-hand-holding"></i> New Checkout</h3><span class="close" onclick="closeModal()">&times;</span></div>
                <form onsubmit="processCheckout(event)"><div class="form-group"><label>Accession Number *</label><input type="text" id="checkoutAccessionNo" required placeholder="e.g., A001"></div>
                <div class="form-group"><label>Member ID *</label><input type="text" id="checkoutMemberId" required placeholder="e.g., M001"></div>
                <div class="form-row"><div class="form-group"><label>Issue Date *</label><input type="date" id="issueDate" value="${new Date().toISOString().split('T')[0]}" required></div>
                <div class="form-group"><label>Loan Period *</label><select id="loanPeriod"><option value="3">3 days</option><option value="7" selected>7 days</option><option value="14">14 days</option><option value="21">21 days</option><option value="30">30 days</option></select></div></div>
                <button type="submit" class="btn btn-success" style="width:100%">Process Checkout</button></form>`;
            modal.style.display = 'block';
        }

        // ========== DATA OPERATIONS ==========
        async function saveBook(event) {
            event.preventDefault();
            const bookData = {
                accessionNo: document.getElementById('accessionNo').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                isbn: document.getElementById('isbn').value || '',
                subject: document.getElementById('subject').value || '',
                ddcNumber: document.getElementById('ddcNumber').value,
                year: parseInt(document.getElementById('year').value) || null,
                totalCopies: parseInt(document.getElementById('totalCopies').value),
                availableCopies: parseInt(document.getElementById('totalCopies').value),
                status: 'Available',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('books').add(bookData);
                closeModal();
                loadCatalog();
                alert('Book added!');
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function saveMember(event) {
            event.preventDefault();
            const memberData = {
                memberId: document.getElementById('memberId').value,
                name: document.getElementById('memberName').value,
                category: document.getElementById('memberCategory').value,
                phone: document.getElementById('memberPhone').value,
                status: document.getElementById('memberStatus').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('members').add(memberData);
                closeModal();
                loadMembers();
                alert('Member added!');
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function processCheckout(event) {
            event.preventDefault();
            const accessionNo = document.getElementById('checkoutAccessionNo').value;
            const memberId = document.getElementById('checkoutMemberId').value;
            const issueDate = new Date(document.getElementById('issueDate').value);
            const dueDate = new Date(issueDate);
            dueDate.setDate(dueDate.getDate() + parseInt(document.getElementById('loanPeriod').value));

            try {
                const booksSnapshot = await db.collection('books').where('accessionNo', '==', accessionNo).where('status', '==', 'Available').get();
                if (booksSnapshot.empty) { alert('Book not available'); return; }
                const bookDoc = booksSnapshot.docs[0];
                const membersSnapshot = await db.collection('members').where('memberId', '==', memberId).where('status', '==', 'Active').get();
                if (membersSnapshot.empty) { alert('Member not active'); return; }

                const transactionId = 'T' + Date.now().toString().slice(-6);
                await db.collection('transactions').add({
                    transactionId, accessionNo, memberId, issueDate, dueDate, returnDate: null, status: 'Borrowed',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await bookDoc.ref.update({ status: 'Borrowed', availableCopies: bookDoc.data().availableCopies - 1 });
                closeModal();
                alert('Checkout successful! ID: ' + transactionId);
                loadCirculation();
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function returnBook(transactionId, accessionNo) {
            if (!confirm('Confirm return?')) return;
            try {
                const returnDate = new Date();
                const transactionRef = db.collection('transactions').doc(transactionId);
                const transactionDoc = await transactionRef.get();
                const transactionData = transactionDoc.data();
                await transactionRef.update({ returnDate, status: 'Returned' });

                const booksSnapshot = await db.collection('books').where('accessionNo', '==', accessionNo).get();
                if (!booksSnapshot.empty) {
                    const bookDoc = booksSnapshot.docs[0];
                    await bookDoc.ref.update({ status: 'Available', availableCopies: (bookDoc.data().availableCopies || 0) + 1 });
                }

                const dueDate = transactionData.dueDate.toDate();
                if (returnDate > dueDate) {
                    const daysLate = Math.ceil((returnDate - dueDate) / (1000 * 60 * 60 * 24));
                    const totalFine = daysLate * 500;
                    await db.collection('fines').add({
                        transactionId: transactionData.transactionId, dueDate, returnDate, daysLate, finePerDay: 500,
                        totalFine, status: 'Unpaid', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert(`Book returned with fine of K${totalFine} (${daysLate} days late)`);
                } else { alert('Book returned!'); }
                loadCirculation();
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function payFine(fineId) {
            if (!confirm('Mark as paid?')) return;
            try {
                await db.collection('fines').doc(fineId).update({ status: 'Paid', paidAt: firebase.firestore.FieldValue.serverTimestamp() });
                loadFines();
                alert('Fine paid');
            } catch (error) { alert('Error: ' + error.message); }
        }

        async function deleteBook(bookId) {
            if (!confirm('Delete this book?')) return;
            try { await db.collection('books').doc(bookId).delete(); loadCatalog(); alert('Deleted'); } 
            catch (error) { alert('Error: ' + error.message); }
        }

        async function deleteMember(memberId) {
            if (!confirm('Delete this member?')) return;
            try { await db.collection('members').doc(memberId).delete(); loadMembers(); alert('Deleted'); } 
            catch (error) { alert('Error: ' + error.message); }
        }

        // ========== HELPER FUNCTIONS ==========
        function searchCatalog() {
            const term = document.getElementById('catalogSearch')?.value.toLowerCase() || '';
            const rows = document.querySelectorAll('#catalogTableBody tr');
            rows.forEach(row => row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none');
        }

        function searchMembers() {
            const term = document.getElementById('memberSearch')?.value.toLowerCase() || '';
            const rows = document.querySelectorAll('#membersTableBody tr');
            rows.forEach(row => row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none');
        }

        function filterByDDC(ddc) {
            const searchBox = document.getElementById('catalogSearch');
            if (searchBox) { searchBox.value = ddc; searchCatalog(); }
        }

                    await db.collection('books').add({ accessionNo: 'A003', title: 'Computer Science Basics', author: 'Chen L.', ddcNumber: '000', totalCopies: 3, availableCopies: 3, status: 'Available', createdAt: new Date() });
                    await db.collection('members').add({ memberId: 'M001', name: 'John Banda', category: 'Non-Teaching Staff', phone: '0999000000', status: 'Active', createdAt: new Date() });
                    await db.collection('members').add({ memberId: 'M002', name: 'Mary Phiri', category: 'Student', phone: '0999000001', status: 'Active', createdAt: new Date() });
                    console.log('Sample data added!');
                }

        loadDashboard();
    </script>
