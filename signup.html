<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Create Account - Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h1>Create Account</h1>
                <p>Join our library community</p>
            </div>
            
            <div class="auth-body">
                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" class="form-control" placeholder="At least 6 characters" required>
                        </div>
                        <small style="color: #6c757d; font-size: 0.75rem;">Password must be at least 6 characters</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-icon">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                        </div>
                    </div>
                    
                    <div id="signupError" class="global-error" style="display: none;"></div>
                    
                    <button type="button" class="btn btn-primary" onclick="handleSignup()">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 1.5rem;">
                    <p>Already have an account? <a href="index.html" class="auth-link">Sign in here</a></p>
                </div>
            </div>
            
            <div class="auth-footer">
                <i class="fas fa-graduation-cap"></i> Join thousands of satisfied library users
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
    
    <script>
        function handleSignup() {
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            signupUser(name, email, password, confirmPassword);
        }
        
        // Clear fields on page load
        window.addEventListener('load', function() {
            document.getElementById('fullName').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
        });
        
        // Allow Enter key to submit
        const inputs = ['fullName', 'email', 'password', 'confirmPassword'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleSignup();
                }
            });
        });
    </script>
</body>
</html>
