<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        .user-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .user-info h3 { margin-bottom: 5px; color: #2c3e50; }
        .user-info p { color: #666; font-size: 0.85rem; }
        .user-role { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .role-admin { background: #e74c3c; color: white; }
        .role-librarian { background: #27ae60; color: white; }
        .user-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .role-select { padding: 6px 12px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; width: auto; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2c5f8a; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .badge-info { background: #d1ecf1; color: #0c5460; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 90%; max-width: 500px; margin: 50px auto; padding: 30px; border-radius: 16px; }
        @media (max-width: 768px) { .user-card { flex-direction: column; align-items: flex-start; } .user-actions { width: 100%; justify-content: flex-start; } }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="main-content" style="margin-left: 0;">
            <div class="top-bar">
                <div class="user-info">
                    <i class="fas fa-user-shield"></i>
                    <span class="user-name" id="userName">Admin</span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </div>
            <div class="content-area">
                <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
                <div class="form-container">
                    <div class="section-header">
                        <h2><i class="fas fa-users-cog"></i> User Management</h2>
                        <button class="btn btn-primary" onclick="showCreateUserModal()"><i class="fas fa-user-plus"></i> Create Staff Account</button>
                    </div>
                    <div id="usersList"><div class="spinner"></div><p>Loading users...</p></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="createUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-user-plus"></i> Create Staff Account</h3><span class="close" onclick="closeCreateModal()">&times;</span></div>
            <form id="createUserForm">
                <div class="form-group"><label>Full Name *</label><input type="text" id="staffName" required placeholder="e.g., John Doe"></div>
                <div class="form-group"><label>Email Address *</label><input type="email" id="staffEmail" required placeholder="staff@school.edu"></div>
                <div class="form-group"><label>Password *</label><input type="password" id="staffPassword" required placeholder="At least 6 characters"></div>
                <div class="form-group"><label>Role *</label>
                    <select id="staffRole">
                        <option value="librarian">Librarian (Full access - can manage everything)</option>
                        <option value="admin">Admin (Full access + User Management)</option>
                    </select>
                </div>
                <div class="form-row"><button type="submit" class="btn btn-success">Create Account</button><button type="button" class="btn btn-danger" onclick="closeCreateModal()">Cancel</button></div>
            </form>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAv3HaMVSZOWO1-R1kq0hBIyzaMe6qJz08",
            authDomain: "library-web-app-bf033.firebaseapp.com",
            projectId: "library-web-app-bf033",
            storageBucket: "library-web-app-bf033.firebasestorage.app",
            messagingSenderId: "767632185573",
            appId: "1:767632185573:web:4e5ff30593d436cba7dc0c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const roleNames = { 'admin': 'Admin', 'librarian': 'Librarian' };
        const roleClass = { 'admin': 'role-admin', 'librarian': 'role-librarian' };
        
        async function checkAdminAccess() {
            const user = auth.currentUser;
            if (!user) { window.location.href = 'index.html'; return false; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            const role = userDoc.exists ? userDoc.data().role : '';
            if (role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'dashboard.html';
                return false;
            }
            document.getElementById('userName').textContent = user.email.split('@')[0];
            return true;
        }
        
        async function loadUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '<div class="spinner"></div><p>Loading users...</p>';
            try {
                const snapshot = await db.collection('users').get();
                const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const currentUser = auth.currentUser;
                if (users.length === 0) { usersList.innerHTML = '<p>No users found.</p>'; return; }
                let html = '';
                for (const user of users) {
                    const userRole = user.role || 'librarian';
                    html += `<div class="user-card"><div class="user-info"><h3>${user.name || user.email.split('@')[0]}</h3><p>${user.email}</p><span class="user-role ${roleClass[userRole] || 'role-librarian'}">${roleNames[userRole] || 'Librarian'}</span><small>Created: ${user.createdAt ? new Date(user.createdAt.toDate()).toLocaleDateString() : 'N/A'}</small></div>
                        <div class="user-actions"><select onchange="changeRole('${user.id}', this.value)" class="role-select" ${user.id === currentUser?.uid ? 'disabled' : ''}>
                            <option value="librarian" ${userRole === 'librarian' ? 'selected' : ''}>Librarian</option>
                            <option value="admin" ${userRole === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>${user.id !== currentUser?.uid ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')"><i class="fas fa-trash"></i> Delete</button>` : '<span class="badge-info">You</span>'}</div></div>`;
                }
                usersList.innerHTML = html;
            } catch (error) { usersList.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`; }
        }
        
        function showCreateUserModal() { document.getElementById('createUserModal').style.display = 'block'; }
        function closeCreateModal() { document.getElementById('createUserModal').style.display = 'none'; document.getElementById('createUserForm').reset(); }
        
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('staffName').value, email = document.getElementById('staffEmail').value, password = document.getElementById('staffPassword').value, role = document.getElementById('staffRole').value;
            if (password.length < 6) { alert('Password must be at least 6 characters'); return; }
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(userCredential.user.uid).set({ name, email, role, status: 'active', createdBy: auth.currentUser?.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                alert(`${name} (${roleNames[role]}) account created!`);
                closeCreateModal(); loadUsers();
            } catch (error) { alert('Error: ' + error.message); }
        });
        
        async function changeRole(userId, newRole) {
            if (!confirm('Change this user\'s role?')) { loadUsers(); return; }
            try { await db.collection('users').doc(userId).update({ role: newRole, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }); alert('Role updated'); loadUsers(); } 
            catch (error) { alert('Error: ' + error.message); loadUsers(); }
        }
        
        async function deleteUser(userId) {
            if (!confirm('Delete this user?')) return;
            try { await db.collection('users').doc(userId).delete(); alert('User deleted'); loadUsers(); } 
            catch (error) { alert('Error: ' + error.message); }
        }
        
        function logout() { auth.signOut().then(() => { window.location.href = 'index.html'; }); }
        
        async function init() { if (await checkAdminAccess()) loadUsers(); }
        init();
        
        window.showCreateUserModal = showCreateUserModal; window.closeCreateModal = closeCreateModal;
        window.changeRole = changeRole; window.deleteUser = deleteUser; window.logout = logout;
    </script>
</body>
</html>
