<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Reset Password - Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-key" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h1>Reset Password</h1>
                <p>We'll send you instructions to reset your password</p>
            </div>
            
            <div class="auth-body">
                <form id="resetForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" class="form-control" placeholder="Enter your registered email" required>
                        </div>
                    </div>
                    
                    <div id="resetError" class="global-error" style="display: none;"></div>
                    <div id="resetSuccess" class="global-error" style="display: none; background: #e8f5e9; color: #2e7d32; border-color: #4caf50;"></div>
                    
                    <button type="button" class="btn btn-primary" onclick="handleReset()">
                        <i class="fas fa-paper-plane"></i> Send Reset Instructions
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="index.html" class="auth-link">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
            
            <div class="auth-footer">
                <i class="fas fa-clock"></i> Password reset link expires in 1 hour
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
    
    <script>
        function handleReset() {
            const email = document.getElementById('email').value;
            resetPassword(email);
        }
        
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleReset();
            }
        });
    </script>
</body>
</html>
