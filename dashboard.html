<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Library Dashboard - DDC Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-book"></i> DDC Library</h2>
                <p>Integrated Management System</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="catalog">
                    <i class="fas fa-books"></i>
                    <span>DDC Catalog</span>
                </a>
                <a href="#" class="nav-item" data-view="members">
                    <i class="fas fa-users"></i>
                    <span>Members</span>
                </a>
                <a href="#" class="nav-item" data-view="circulation">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Circulation</span>
                </a>
                <a href="#" class="nav-item" data-view="fines">
                    <i class="fas fa-money-bill"></i>
                    <span>Fines</span>
                </a>
                <a href="#" class="nav-item" data-view="ddc">
                    <i class="fas fa-sitemap"></i>
                    <span>DDC Classes</span>
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="user-info">
                    <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
                    <span class="user-name" id="userName">Loading...</span>
                    <button onclick="logoutUser()" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
            
            <div class="content-area" id="contentArea">
                <!-- Content will be loaded here -->
                <div style="text-align: center; padding: 50px;">
                    <div class="spinner"></div>
                    <p>Loading library system...</p>
                </div>
            </div>
        </main>
    </div>
    
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content" id="modalContent"></div>
    </div>
    
    <script src="js/auth.js"></script>
    <script>
        // ========== PROTECT PAGE ==========
        protectPage();
        
        // ========== FIREBASE REFERENCE ==========
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
        
        // ========== DDC MAIN CLASSES ==========
        const ddcMainClasses = [
            { number: '000', name: 'General Works' },
            { number: '100', name: 'Philosophy & Psychology' },
            { number: '200', name: 'Religion' },
            { number: '300', name: 'Social Sciences' },
            { number: '400', name: 'Language' },
            { number: '500', name: 'Natural Sciences & Mathematics' },
            { number: '600', name: 'Technology' },
            { number: '700', name: 'Arts & Recreation' },
            { number: '800', name: 'Literature' },
            { number: '900', name: 'History & Geography' }
        ];
        
        // ========== DISPLAY USER NAME ==========
        async function displayUserName() {
            const profile = await getUserProfile();
            const userNameElement = document.getElementById('userName');
            if (profile && profile.name) {
                userNameElement.textContent = profile.name;
            } else {
                const user = getCurrentUser();
                userNameElement.textContent = user?.email?.split('@')[0] || 'Librarian';
            }
        }
        displayUserName();
        
        // ========== MOBILE MENU TOGGLE ==========
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }
        
        // ========== DASHBOARD VIEW ==========
        async function loadDashboard() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div><p>Loading dashboard...</p></div>';
            
            try {
                // Get statistics
                const booksSnapshot = await db.collection('books').get();
                const membersSnapshot = await db.collection('members').get();
                const borrowedSnapshot = await db.collection('transactions').where('status', '==', 'Borrowed').get();

                const totalBooks = booksSnapshot.size;
                const availableBooks = booksSnapshot.docs.filter(d => d.data().status === 'Available').length;
                const borrowedBooks = booksSnapshot.docs.filter(d => d.data().status === 'Borrowed').length;
                const totalMembers = membersSnapshot.size;
                const activeBorrowings = borrowedSnapshot.size;

                // Get recent transactions
                let transactionsHtml = '';
                try {
                    const recent = await db.collection('transactions').orderBy('issueDate', 'desc').limit(5).get();
                    recent.forEach(doc => {
                        const t = doc.data();
                        const issueDate = t.issueDate ? new Date(t.issueDate.toDate()).toLocaleDateString() : 'N/A';
                        transactionsHtml += `
                            <tr>
                                <td>${t.transactionId || 'N/A'}</td>
                                <td>${t.accessionNo || 'N/A'}</td>
                                <td>${t.memberId || 'N/A'}</td>
                                <td>${issueDate}</td>
                                <td><span class="badge badge-${t.status === 'Borrowed' ? 'borrowed' : 'available'}">${t.status || 'N/A'}</span></td>
                            </tr>
                        `;
                    });
                } catch(e) { console.log('No transactions'); }

                const html = `
                    <div class="stats-container">
                        <div class="stat-card">
                            <i class="fas fa-book"></i>
                            <h3>Total Books</h3>
                            <div class="stat-number">${totalBooks}</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-check-circle"></i>
                            <h3>Available Books</h3>
                            <div class="stat-number">${availableBooks}</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-exchange-alt"></i>
                            <h3>Borrowed Books</h3>
                            <div class="stat-number">${borrowedBooks}</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-users"></i>
                            <h3>Total Members</h3>
                            <div class="stat-number">${totalMembers}</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-clock"></i>
                            <h3>Active Borrowings</h3>
                            <div class="stat-number">${activeBorrowings}</div>
                        </div>
                    </div>
                    
                    <div class="form-container">
                        <h3><i class="fas fa-history"></i> Recent Transactions</h3>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Transaction ID</th>
                                        <th>Accession No</th>
                                        <th>Member ID</th>
                                        <th>Issue Date</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${transactionsHtml || '<tr><td colspan="5" style="text-align: center;">No recent transactions</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="quick-actions">
                        <button class="btn btn-primary" onclick="showAddBookForm()"><i class="fas fa-plus"></i> Add Book</button>
                        <button class="btn btn-success" onclick="showAddMemberForm()"><i class="fas fa-user-plus"></i> Add Member</button>
                        <button class="btn btn-warning" onclick="showCheckoutForm()"><i class="fas fa-hand-holding"></i> New Checkout</button>
                    </div>
                `;
                contentArea.innerHTML = html;
            } catch (error) {
                console.error(error);
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading dashboard. Check Firebase connection.</div>';
            }
        }
        
        // ========== CATALOG VIEW ==========
        async function loadCatalog() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div><p>Loading catalog...</p></div>';
            
            try {
                const booksSnapshot = await db.collection('books').orderBy('accessionNo').get();
                let booksHtml = '';
                booksSnapshot.forEach(doc => {
                    const b = doc.data();
                    booksHtml += `
                        <tr>
                            <td>${b.accessionNo || 'N/A'}</td>
                            <td><strong>${b.title || 'N/A'}</strong></td>
                            <td>${b.author || 'N/A'}</td>
                            <td>${b.isbn || '-'}</td>
                            <td>${b.subject || '-'}</td>
                            <td><span class="badge badge-info">${b.ddcNumber || '-'}</span></td>
                            <td>${b.year || '-'}</td>
                            <td>${b.totalCopies || 0}</td>
                            <td>${b.availableCopies || 0}</td>
                            <td><span class="badge badge-${b.status === 'Available' ? 'available' : 'borrowed'}">${b.status || 'Available'}</span></td>
                            <td>
                                <button class="btn btn-danger action-btn" onclick="deleteBook('${doc.id}')"><i class="fas fa-trash"></i> Delete</button>
                            </td>
                        </tr>
                    `;
                });

                const html = `
                    <div class="form-container">
                        <div class="section-header">
                            <h2><i class="fas fa-books"></i> DDC Catalog</h2>
                            <button class="btn btn-success" onclick="showAddBookForm()"><i class="fas fa-plus"></i> Add New Book</button>
                        </div>
                        
                        <div class="search-box">
                            <input type="text" id="catalogSearch" placeholder="Search by title, author, ISBN, or DDC number...">
                            <button class="btn btn-primary" onclick="searchCatalog()"><i class="fas fa-search"></i> Search</button>
                        </div>

                        <div class="ddc-nav">
                            ${ddcMainClasses.map(ddc => `
                                <div class="ddc-class" onclick="filterByDDC('${ddc.number}')">
                                    <strong>${ddc.number}</strong><br>
                                    <small>${ddc.name}</small>
                                </div>
                            `).join('')}
                        </div>

                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Accession</th>
                                        <th>Title</th>
                                        <th>Author</th>
                                        <th>ISBN</th>
                                        <th>Subject</th>
                                        <th>DDC</th>
                                        <th>Year</th>
                                        <th>Total</th>
                                        <th>Available</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="catalogTableBody">
                                    ${booksHtml || '<tr><td colspan="11" style="text-align:center">No books. Click "Add New Book" to get started!</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading catalog</div>';
            }
        }
        
        // ========== MEMBERS VIEW ==========
        async function loadMembers() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div><p>Loading members...</p></div>';
            
            try {
                const membersSnapshot = await db.collection('members').orderBy('memberId').get();
                let membersHtml = '';
                membersSnapshot.forEach(doc => {
                    const m = doc.data();
                    membersHtml += `
                        <tr>
                            <td><strong>${m.memberId || 'N/A'}</strong></td>
                            <td>${m.name || 'N/A'}</td>
                            <td><span class="badge badge-info">${m.category || 'N/A'}</span></td>
                            <td>${m.phone || 'N/A'}</td>
                            <td><span class="badge badge-${m.status === 'Active' ? 'available' : 'borrowed'}">${m.status || 'Active'}</span></td>
                            <td>
                                <button class="btn btn-danger action-btn" onclick="deleteMember('${doc.id}')"><i class="fas fa-trash"></i> Delete</button>
                            </td>
                        </tr>
                    `;
                });

                const html = `
                    <div class="form-container">
                        <div class="section-header">
                            <h2><i class="fas fa-users"></i> Library Members</h2>
                            <button class="btn btn-success" onclick="showAddMemberForm()"><i class="fas fa-user-plus"></i> Add Member</button>
                        </div>
                        
                        <div class="search-box">
                            <input type="text" id="memberSearch" placeholder="Search by name, ID, or phone...">
                            <button class="btn btn-primary" onclick="searchMembers()"><i class="fas fa-search"></i> Search</button>
                        </div>

                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Member ID</th>
                                        <th>Name</th>
                                        <th>Category</th>
                                        <th>Phone</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="membersTableBody">
                                    ${membersHtml || '<tr><td colspan="6" style="text-align:center">No members registered. Click "Add Member" to get started!</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading members</div>';
            }
        }
        
        // ========== CIRCULATION VIEW ==========
        async function loadCirculation() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div><p>Loading circulation...</p></div>';
            
            try {
                const transactionsSnapshot = await db.collection('transactions').orderBy('issueDate', 'desc').get();
                let transactionsHtml = '';
                transactionsSnapshot.forEach(doc => {
                    const t = doc.data();
                    const issueDate = t.issueDate ? new Date(t.issueDate.toDate()).toLocaleDateString() : '-';
                    const dueDate = t.dueDate ? new Date(t.dueDate.toDate()).toLocaleDateString() : '-';
                    const returnDate = t.returnDate ? new Date(t.returnDate.toDate()).toLocaleDateString() : '-';
                    const isOverdue = t.dueDate && !t.returnDate && t.dueDate.toDate() < new Date();
                    transactionsHtml += `
                        <tr>
                            <td>${t.transactionId || 'N/A'}</td>
                            <td><strong>${t.accessionNo || 'N/A'}</strong></td>
                            <td>${t.memberId || 'N/A'}</td>
                            <td>${issueDate}</td>
                            <td>${dueDate}</td>
                            <td>${returnDate}</td>
                            <td><span class="badge ${isOverdue ? 'badge-borrowed' : (t.status === 'Borrowed' ? 'badge-warning' : 'badge-available')}">${t.status || 'N/A'}${isOverdue ? ' (Overdue)' : ''}</span></td>
                            <td>${t.status === 'Borrowed' ? `<button class="btn btn-success action-btn" onclick="returnBook('${doc.id}', '${t.accessionNo}')"><i class="fas fa-undo"></i> Return</button>` : '-'}</td>
                        </tr>
                    `;
                });

                const html = `
                    <div class="form-container">
                        <div class="section-header">
                            <h2><i class="fas fa-exchange-alt"></i> Circulation</h2>
                            <button class="btn btn-success" onclick="showCheckoutForm()"><i class="fas fa-hand-holding"></i> New Checkout</button>
                        </div>
                        
                        <div class="search-box">
                            <input type="text" id="circulationSearch" placeholder="Search by transaction ID, accession no, or member ID...">
                            <button class="btn btn-primary" onclick="searchCirculation()"><i class="fas fa-search"></i> Search</button>
                        </div>

                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Transaction ID</th>
                                        <th>Accession No</th>
                                        <th>Member ID</th>
                                        <th>Issue Date</th>
                                        <th>Due Date</th>
                                        <th>Return Date</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="circulationTableBody">
                                    ${transactionsHtml || '<tr><td colspan="8" style="text-align:center">No transactions found</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading circulation</div>';
            }
        }
        
        // ========== FINES VIEW ==========
        async function loadFines() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div class="spinner"></div><p>Loading fines...</p></div>';
            
            try {
                const finesSnapshot = await db.collection('fines').orderBy('createdAt', 'desc').get();
                let finesHtml = '';
                let totalFines = 0;
                finesSnapshot.forEach(doc => {
                    const f = doc.data();
                    totalFines += f.totalFine || 0;
                    finesHtml += `
                        <tr>
                            <td>${f.transactionId || 'N/A'}</td>
                            <td>${f.dueDate ? new Date(f.dueDate.toDate()).toLocaleDateString() : '-'}</td>
                            <td>${f.returnDate ? new Date(f.returnDate.toDate()).toLocaleDateString() : '-'}</td>
                            <td><span class="badge badge-warning">${f.daysLate || 0} days</span></td>
                            <td><strong>K${f.finePerDay || 500}</strong></td>
                            <td><strong style="color: #e74c3c;">K${f.totalFine || 0}</strong></td>
                            <td>${f.status !== 'Paid' ? `<button class="btn btn-success action-btn" onclick="payFine('${doc.id}')"><i class="fas fa-money-bill"></i> Pay</button>` : '<span class="badge badge-available"><i class="fas fa-check"></i> Paid</span>'}</td>
                        </tr>
                    `;
                });

                const html = `
                    <div class="stats-container">
                        <div class="stat-card">
                            <i class="fas fa-money-bill-wave"></i>
                            <h3>Total Outstanding Fines</h3>
                            <div class="stat-number" style="color: #e74c3c;">K${totalFines.toLocaleString()}</div>
                        </div>
                    </div>
                    
                    <div class="form-container">
                        <h2><i class="fas fa-exclamation-triangle"></i> Fines Management</h2>
                        
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Transaction ID</th>
                                        <th>Due Date</th>
                                        <th>Return Date</th>
                                        <th>Days Late</th>
                                        <th>Fine per Day</th>
                                        <th>Total Fine</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${finesHtml || '<tr><td colspan="7" style="text-align:center">No fines recorded</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
                contentArea.innerHTML = html;
            } catch (error) {
                contentArea.innerHTML = '<div style="text-align:center;padding:50px;color:red;">Error loading fines</div>';
            }
        }
        
        // ========== DDC CLASSES VIEW ==========
        function loadDDCClasses() {
            const html = `
                <div class="form-container">
                    <h2><i class="fas fa-sitemap"></i> Dewey Decimal Classification (DDC)</h2>
                    <p style="margin-bottom: 20px; color: #6c757d;">The Dewey Decimal Classification system organizes library materials by discipline or field of study.</p>
                    
                    <div class="ddc-nav" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-bottom: 30px;">
                        ${ddcMainClasses.map(ddc => `
                            <div class="ddc-class" style="padding: 20px;">
                                <strong style="font-size: 1.5rem;">${ddc.number}</strong><br>
                                <span style="font-size: 0.9rem;">${ddc.name}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Class Number</th>
                                    <th>Class Name</th>
                                    <th>Description</th>
                                    <th>Example Subjects</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${ddcMainClasses.map(ddc => `
                                    <tr>
                                        <td><strong>${ddc.number}</strong></td>
                                        <td>${ddc.name}</td>
                                        <td>Books covering ${ddc.name.toLowerCase()}</td>
                                        <td>${ddc.number === '000' ? 'Computers, Libraries, Journalism' : 
                                            ddc.number === '100' ? 'Ethics, Psychology, Philosophy' :
                                            ddc.number === '200' ? 'Bible, Theology, Mythology' :
                                            ddc.number === '300' ? 'Economics, Law, Education' :
                                            ddc.number === '400' ? 'English, Spanish, French, Latin' :
                                            ddc.number === '500' ? 'Mathematics, Physics, Biology' :
                                            ddc.number === '600' ? 'Medicine, Engineering, Agriculture' :
                                            ddc.number === '700' ? 'Art, Music, Sports, Photography' :
                                            ddc.number === '800' ? 'Poetry, Drama, Fiction, Essays' :
                                            'Geography, Travel, Biography'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    <div style="margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                        <h4><i class="fas fa-info-circle"></i> About DDC</h4>
                        <p>The Dewey Decimal Classification (DDC) is a library classification system created by Melvil Dewey in 1876. It is used in over 200,000 libraries in 135 countries. The system organizes knowledge into ten main classes, each represented by a three-digit number.</p>
                        <br>
                        <p><strong>How to use:</strong> When adding a new book, select the appropriate DDC class number based on the book's subject. This helps organize books by topic and makes them easier to find.</p>
                    </div>
                </div>
            `;
            document.getElementById('contentArea').innerHTML = html;
        }
        
        // ========== FORM FUNCTIONS ==========
        function showAddBookForm() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h3><i class="fas fa-plus-circle"></i> Add New Book</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <form onsubmit="saveBook(event)">
                    <div class="form-group"><label>Accession Number *</label><input type="text" id="accessionNo" required placeholder="e.g., A001"></div>
                    <div class="form-group"><label>Title *</label><input type="text" id="title" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>Author *</label><input type="text" id="author" required></div>
                        <div class="form-group"><label>ISBN</label><input type="text" id="isbn" placeholder="978-3-16-148410-0"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Subject</label><input type="text" id="subject"></div>
                        <div class="form-group"><label>DDC Number *</label>
                            <select id="ddcNumber" required>
                                <option value="">Select DDC Class</option>
                                ${ddcMainClasses.map(d => `<option value="${d.number}">${d.number} - ${d.name}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Year</label><input type="number" id="year" min="1900" max="2026"></div>
                        <div class="form-group"><label>Total Copies *</label><input type="number" id="totalCopies" value="1" min="1" required></div>
                    </div>
                    <button type="submit" class="btn btn-success" style="width:100%"><i class="fas fa-save"></i> Save Book</button>
                </form>`;
            modal.style.display = 'block';
        }
        
        function showAddMemberForm() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h3><i class="fas fa-user-plus"></i> Add New Member</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <form onsubmit="saveMember(event)">
                    <div class="form-group"><label>Member ID *</label><input type="text" id="memberId" required placeholder="e.g., M001"></div>
                    <div class="form-group"><label>Full Name *</label><input type="text" id="memberName" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>Category *</label>
                            <select id="memberCategory" required>
                                <option value="">Select Category</option>
                                <option value="Student">Student (max 3 books)</option>
                                <option value="Teaching Staff">Teaching Staff (max 5 books)</option>
                                <option value="Non-Teaching Staff">Non-Teaching Staff (max 4 books)</option>
                                <option value="External Member">External Member (max 2 books)</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Phone *</label><input type="tel" id="memberPhone" required></div>
                    </div>
                    <div class="form-group"><label>Status *</label>
                        <select id="memberStatus" required>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success" style="width:100%"><i class="fas fa-save"></i> Save Member</button>
                </form>`;
            modal.style.display = 'block';
        }
        
        function showCheckoutForm() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">
                    <h3><i class="fas fa-hand-holding"></i> New Checkout</h3>
                    <span class="close" onclick="closeModal()">&times;</span>
                </div>
                <form onsubmit="processCheckout(event)">
                    <div class="form-group"><label>Accession Number *</label><input type="text" id="checkoutAccessionNo" required placeholder="e.g., A001"></div>
                    <div class="form-group"><label>Member ID *</label><input type="text" id="checkoutMemberId" required placeholder="e.g., M001"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Issue Date *</label><input type="date" id="issueDate" value="${new Date().toISOString().split('T')[0]}" required></div>
                        <div class="form-group"><label>Loan Period *</label>
                            <select id="loanPeriod">
                                <option value="3">3 days</option>
                                <option value="7" selected>7 days</option>
                                <option value="14">14 days</option>
                                <option value="21">21 days</option>
                                <option value="30">30 days</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success" style="width:100%"><i class="fas fa-check"></i> Process Checkout</button>
                </form>`;
            modal.style.display = 'block';
        }
        
        // ========== DATA OPERATIONS ==========
        async function saveBook(event) {
            event.preventDefault();
            const bookData = {
                accessionNo: document.getElementById('accessionNo').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                isbn: document.getElementById('isbn').value || '',
                subject: document.getElementById('subject').value || '',
                ddcNumber: document.getElementById('ddcNumber').value,
                year: parseInt(document.getElementById('year').value) || null,
                totalCopies: parseInt(document.getElementById('totalCopies').value),
                availableCopies: parseInt(document.getElementById('totalCopies').value),
                status: 'Available',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('books').add(bookData);
                closeModal();
                loadCatalog();
                showToast('Book added successfully!', 'success');
            } catch (error) { alert('Error: ' + error.message); }
        }
        
        async function saveMember(event) {
            event.preventDefault();
            const memberData = {
                memberId: document.getElementById('memberId').value,
                name: document.getElementById('memberName').value,
                category: document.getElementById('memberCategory').value,
                phone: document.getElementById('memberPhone').value,
                status: document.getElementById('memberStatus').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('members').add(memberData);
                closeModal();
                loadMembers();
                showToast('Member added successfully!', 'success');
            } catch (error) { alert('Error: ' + error.message); }
        }
        
        async function processCheckout(event) {
            event.preventDefault();
            const accessionNo = document.getElementById('checkoutAccessionNo').value;
            const memberId = document.getElementById('checkoutMemberId').value;
            const issueDate = new Date(document.getElementById('issueDate').value);
            const dueDate = new Date(issueDate);
            dueDate.setDate(dueDate.getDate() + parseInt(document.getElementById('loanPeriod').value));
            
            try {
                const booksSnapshot = await db.collection('books').where('accessionNo', '==', accessionNo).where('status', '==', 'Available').get();
                if (booksSnapshot.empty) { alert('Book not available'); return; }
                const bookDoc = booksSnapshot.docs[0];
                
                const membersSnapshot = await db.collection('members').where('memberId', '==', memberId).where('status', '==', 'Active').get();
                if (membersSnapshot.empty) { alert('Member not active'); return; }
                
                const transactionId = 'T' + Date.now().toString().slice(-6);
                await db.collection('transactions').add({
                    transactionId, accessionNo, memberId, issueDate, dueDate, returnDate: null, status: 'Borrowed',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await bookDoc.ref.update({ status: 'Borrowed', availableCopies: bookDoc.data().availableCopies - 1 });
                closeModal();
                showToast('Checkout successful! ID: ' + transactionId, 'success');
                loadCirculation();
            } catch (error) { alert('Error: ' + error.message); }
        }
        
        async function returnBook(transactionId, accessionNo) {
            if (!confirm('Confirm book return?')) return;
            try {
                const returnDate = new Date();
                const transactionRef = db.collection('transactions').doc(transactionId);
                const transactionDoc = await transactionRef.get();
                const transactionData = transactionDoc.data();
                await transactionRef.update({ returnDate, status: 'Returned' });
                
                const booksSnapshot = await db.collection('books').where('accessionNo', '==', accessionNo).get();
                if (!booksSnapshot.empty) {
                    const bookDoc = booksSnapshot.docs[0];
                    await bookDoc.ref.update({ status: 'Available', availableCopies: (bookDoc.data().availableCopies || 0) + 1 });
                }
                
                const dueDate = transactionData.dueDate.toDate();
                if (returnDate > dueDate) {
                    const daysLate = Math.ceil((returnDate - dueDate) / (1000 * 60 * 60 * 24));
                    const totalFine = daysLate * 500;
                    await db.collection('fines').add({
                        transactionId: transactionData.transactionId, dueDate, returnDate, daysLate, finePerDay: 500,
                        totalFine, status: 'Unpaid', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showToast(`Book returned with fine of K${totalFine} (${daysLate} days late)`, 'warning');
                } else {
                    showToast('Book returned successfully!', 'success');
                }
                loadCirculation();
            } catch (error) { alert('Error: ' + error.message); }
        }
        
        async function payFine(fineId) {
            if (!confirm('Mark this fine as paid?')) return;
            try {
                await db.collection('fines').doc(fineId).update({ status: 'Paid', paidAt: firebase.firestore.FieldValue.serverTimestamp() });
                loadFines();
                showToast('Fine marked as paid', 'success');
            } catch (error) { alert('Error: ' + error.message); }
        }
        
        async function deleteBook(bookId) {
            if (!confirm('Delete this book?')) return;
            try { await db.collection('books').doc(bookId).delete(); loadCatalog(); showToast('Book deleted', 'success'); } 
            catch (error) { alert('Error: ' + error.message); }
        }
        
        async function deleteMember(memberId) {
            if (!confirm('Delete this member?')) return;
            try { await db.collection('members').doc(memberId).delete(); loadMembers(); showToast('Member deleted', 'success'); } 
            catch (error) { alert('Error: ' + error.message); }
        }
        
        // ========== HELPER FUNCTIONS ==========
        function searchCatalog() {
            const term = document.getElementById('catalogSearch')?.value.toLowerCase() || '';
            const rows = document.querySelectorAll('#catalogTableBody tr');
            rows.forEach(row => row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none');
        }
        
        function searchMembers() {
            const term = document.getElementById('memberSearch')?.value.toLowerCase() || '';
            const rows = document.querySelectorAll('#membersTableBody tr');
            rows.forEach(row => row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none');
        }
        
        function searchCirculation() {
            const term = document.getElementById('circulationSearch')?.value.toLowerCase() || '';
            const rows = document.querySelectorAll('#circulationTableBody tr');
            rows.forEach(row => row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none');
        }
        
        function filterByDDC(ddc) {
            const searchBox = document.getElementById('catalogSearch');
            if (searchBox) { searchBox.value = ddc; searchCatalog(); }
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ========== NAVIGATION HANDLER ==========
        function handleNavigation() {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const view = item.dataset.view;
                    navItems.forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    
                    switch(view) {
                        case 'dashboard': loadDashboard(); break;
                        case 'catalog': loadCatalog(); break;
                        case 'members': loadMembers(); break;
                        case 'circulation': loadCirculation(); break;
                        case 'fines': loadFines(); break;
                        case 'ddc': loadDDCClasses(); break;
                    }
                });
            });
        }
        
        // ========== INITIALIZE SAMPLE DATA ==========
        async function initializeSampleData() {
            try {
                const booksSnapshot = await db.collection('books').limit(1).get();
                if (booksSnapshot.empty) {
                    const sampleBooks = [
                        { accessionNo: 'A001', title: 'Introduction to Library Science', author: 'Smith J.', isbn: '9780000001', subject: 'Library Science', ddcNumber: '020', year: 2023, totalCopies: 4, availableCopies: 4, status: 'Available', createdAt: new Date() },
                        { accessionNo: 'A002', title: 'History of Malawi', author: 'Banda M.', isbn: '9780000002', subject: 'History', ddcNumber: '900', year: 2022, totalCopies: 2, availableCopies: 2, status: 'Available', createdAt: new Date() },
                        { accessionNo: 'A003', title: 'Computer Science Basics', author: 'Chen L.', isbn: '9780000003', subject: 'Computer Science', ddcNumber: '000', year: 2024, totalCopies: 3, availableCopies: 3, status: 'Available', createdAt: new Date() }
                    ];
                    for (const book of sampleBooks) await db.collection('books').add(book);
                    
                    const sampleMembers = [
                        { memberId: 'M001', name: 'John Banda', category: 'Non-Teaching Staff', phone: '0999000000', status: 'Active', createdAt: new Date() },
                        { memberId: 'M002', name: 'Mary Phiri', category: 'Student', phone: '0999000001', status: 'Active', createdAt: new Date() }
                    ];
                    for (const member of sampleMembers) await db.collection('members').add(member);
                    console.log('Sample data initialized');
                }
            } catch(e) { console.log('Sample data init skipped'); }
        }
        
        // ========== INITIALIZE ==========
        setTimeout(() => {
            initializeSampleData();
            handleNavigation();
            loadDashboard();
        }, 500);
        
        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) modal.style.display = 'none';
        };
    </script>
</body>
